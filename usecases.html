<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>統合25ユースケース｜業務課題×AI解決策マトリクス</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f1ea;
  --bg-paper: #fbf9f4;
  --ink: #1a1f2e;
  --ink-soft: #3d4556;
  --ink-mute: #6b7280;
  --line: #d8d2c2;
  --line-soft: #e8e3d5;
  --accent: #b8543d;
  --accent-dark: #8b3d2a;
  --gold: #b8893f;
  --chat: #2563a8;
  --agent: #7a3e9d;
  --rag: #2d7a4f;
  --chat-bg: #e8eef7;
  --agent-bg: #efe7f4;
  --rag-bg: #e4efe7;
  --sans: "Noto Sans JP", -apple-system, sans-serif;
  --serif: "Noto Serif JP", "Yu Mincho", serif;
  --mono: "JetBrains Mono", monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.7;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ------ レイアウト ------ */
.app {
  display: grid;
  grid-template-rows: auto 1fr;
  height: 100vh;
}

/* ------ ヘッダー ------ */
.header {
  background: var(--ink);
  color: var(--bg-paper);
  padding: 16px 28px;
  border-bottom: 3px solid var(--accent);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  flex-wrap: wrap;
}
.header-left { display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; }
.header-title {
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 600;
  letter-spacing: 0.02em;
}
.header-title .accent { color: var(--accent); }
.header-sub {
  font-size: 11px;
  letter-spacing: 0.18em;
  color: #a8a5a0;
  text-transform: uppercase;
  font-family: var(--mono);
}
.header-stats {
  display: flex;
  gap: 0;
  font-size: 11px;
}
.stat {
  padding: 4px 16px;
  border-left: 1px solid #3a4050;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 72px;
}
.stat:last-child { border-right: 1px solid #3a4050; }
.stat-num {
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 600;
  color: var(--bg-paper);
  line-height: 1;
}
.stat-lbl {
  font-size: 10px;
  color: #a8a5a0;
  letter-spacing: 0.1em;
  margin-top: 4px;
}

/* ------ メイン ------ */
.main {
  display: grid;
  grid-template-columns: 380px 1fr;
  overflow: hidden;
  height: 100%;
}

/* ------ サイドバー ------ */
.sidebar {
  background: var(--bg-paper);
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-head {
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--line-soft);
  background: var(--bg-paper);
}
.search-wrap {
  position: relative;
  margin-bottom: 12px;
}
.search {
  width: 100%;
  padding: 10px 12px 10px 34px;
  border: 1px solid var(--line);
  background: #fff;
  font-family: var(--sans);
  font-size: 13px;
  color: var(--ink);
  border-radius: 2px;
  transition: border-color 0.15s;
}
.search:focus {
  outline: none;
  border-color: var(--accent);
}
.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--ink-mute);
  pointer-events: none;
}
.filter-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.chip {
  padding: 4px 10px;
  border: 1px solid var(--line);
  background: #fff;
  font-size: 11px;
  color: var(--ink-soft);
  cursor: pointer;
  border-radius: 999px;
  transition: all 0.15s;
  font-family: var(--sans);
  white-space: nowrap;
}
.chip:hover { border-color: var(--ink-soft); }
.chip.active {
  background: var(--ink);
  color: var(--bg-paper);
  border-color: var(--ink);
}
.chip .dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  margin-right: 4px;
  vertical-align: middle;
}

.sidebar-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}
.sidebar-list::-webkit-scrollbar { width: 8px; }
.sidebar-list::-webkit-scrollbar-track { background: transparent; }
.sidebar-list::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
.sidebar-list::-webkit-scrollbar-thumb:hover { background: var(--ink-mute); }

.group-header {
  padding: 12px 20px 6px;
  font-family: var(--serif);
  font-size: 11px;
  letter-spacing: 0.12em;
  color: var(--ink-mute);
  font-weight: 600;
  text-transform: uppercase;
}
.uc-item {
  padding: 12px 20px;
  border-bottom: 1px solid var(--line-soft);
  cursor: pointer;
  transition: all 0.12s;
  border-left: 3px solid transparent;
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.uc-item:hover {
  background: #fff;
  border-left-color: var(--gold);
}
.uc-item.active {
  background: #fff;
  border-left-color: var(--accent);
}
.uc-no {
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 600;
  color: var(--accent);
  line-height: 1;
  min-width: 28px;
  padding-top: 2px;
}
.uc-item.active .uc-no { color: var(--accent-dark); }
.uc-body { flex: 1; min-width: 0; }
.uc-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--ink);
  line-height: 1.4;
  margin-bottom: 4px;
}
.uc-meta {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  align-items: center;
}
.uc-pattern {
  font-size: 10px;
  color: var(--ink-mute);
  font-family: var(--mono);
}
.fit-marks {
  display: inline-flex;
  gap: 3px;
  margin-left: auto;
}
.fit-pill {
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 2px;
  font-weight: 500;
  letter-spacing: 0.02em;
}
.fit-pill.chat { background: var(--chat-bg); color: var(--chat); }
.fit-pill.agent { background: var(--agent-bg); color: var(--agent); }
.fit-pill.rag { background: var(--rag-bg); color: var(--rag); }
.fit-pill.dim { opacity: 0.3; }

.no-results {
  padding: 40px 20px;
  text-align: center;
  color: var(--ink-mute);
  font-size: 12px;
}

/* ------ メインビュー ------ */
.content {
  overflow-y: auto;
  background: var(--bg);
  position: relative;
}
.content::-webkit-scrollbar { width: 10px; }
.content::-webkit-scrollbar-track { background: var(--bg); }
.content::-webkit-scrollbar-thumb { background: var(--line); border-radius: 5px; }

.view-tabs {
  position: sticky;
  top: 0;
  background: var(--bg);
  border-bottom: 1px solid var(--line);
  padding: 12px 32px 0;
  display: flex;
  gap: 4px;
  z-index: 10;
}
.vtab {
  padding: 10px 18px;
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-mute);
  transition: all 0.15s;
}
.vtab:hover { color: var(--ink); }
.vtab.active {
  color: var(--accent-dark);
  border-bottom-color: var(--accent);
}

/* ------ 詳細ビュー ------ */
.detail {
  padding: 32px 40px 60px;
  max-width: 1100px;
  display: none;
}
.detail.active { display: block; animation: fadeUp 0.35s ease; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.detail-head {
  margin-bottom: 28px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--line);
}
.breadcrumb {
  font-size: 11px;
  color: var(--ink-mute);
  letter-spacing: 0.08em;
  font-family: var(--mono);
  margin-bottom: 10px;
}
.breadcrumb .sep { margin: 0 8px; opacity: 0.5; }
.detail-no {
  font-family: var(--serif);
  font-size: 13px;
  color: var(--accent);
  letter-spacing: 0.15em;
  font-weight: 500;
  margin-bottom: 6px;
}
.detail-title {
  font-family: var(--serif);
  font-size: 32px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.3;
  margin-bottom: 16px;
}
.detail-badges {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}
.badge {
  font-size: 11px;
  padding: 4px 10px;
  border: 1px solid var(--line);
  background: var(--bg-paper);
  color: var(--ink-soft);
  border-radius: 2px;
  font-weight: 500;
}
.badge.track { border-color: var(--gold); color: var(--gold); }
.badge.cat {
  background: var(--ink);
  color: var(--bg-paper);
  border-color: var(--ink);
}

/* 2カラムセクション */
.section-2col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  margin-bottom: 32px;
}
@media (max-width: 900px) {
  .section-2col { grid-template-columns: 1fr; }
}
.card {
  background: var(--bg-paper);
  border: 1px solid var(--line);
  padding: 22px 24px;
  border-radius: 2px;
  position: relative;
}
.card-label {
  font-family: var(--serif);
  font-size: 11px;
  letter-spacing: 0.2em;
  color: var(--ink-mute);
  margin-bottom: 10px;
  font-weight: 600;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-label::before {
  content: "";
  display: inline-block;
  width: 20px;
  height: 1px;
  background: var(--accent);
}
.card h3 {
  font-family: var(--serif);
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 12px;
  color: var(--ink);
}
.card-body {
  font-size: 13.5px;
  line-height: 1.85;
  color: var(--ink-soft);
  white-space: pre-wrap;
  word-wrap: break-word;
}

.card.issue { border-left: 3px solid #a04040; }
.card.tobe { border-left: 3px solid #3d7a5a; }

/* ソリューション比較セクション */
.solutions {
  margin-bottom: 32px;
}
.sec-title {
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--ink);
  display: flex;
  align-items: baseline;
  gap: 12px;
}
.sec-title .sec-num {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 0.15em;
}
.sol-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
@media (max-width: 1100px) { .sol-grid { grid-template-columns: 1fr; } }

.sol-card {
  background: var(--bg-paper);
  border: 1px solid var(--line);
  padding: 20px 22px;
  border-radius: 2px;
  position: relative;
  display: flex;
  flex-direction: column;
}
.sol-card .sol-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
  padding-bottom: 12px;
  border-bottom: 1px dashed var(--line);
}
.sol-name {
  font-family: var(--serif);
  font-size: 14px;
  font-weight: 600;
}
.sol-type {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--ink-mute);
  margin-top: 2px;
}
.sol-fit {
  font-size: 22px;
  font-family: var(--serif);
  font-weight: 700;
  line-height: 1;
}
.sol-fit.excellent { color: var(--accent); }
.sol-fit.good { color: var(--gold); }
.sol-fit.okay { color: var(--ink-mute); }
.sol-fit.poor { color: #999; opacity: 0.5; }
.sol-fit-lbl {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--ink-mute);
  letter-spacing: 0.1em;
  text-align: right;
  margin-top: 4px;
}

.sol-card.chat { border-top: 3px solid var(--chat); }
.sol-card.agent { border-top: 3px solid var(--agent); }
.sol-card.rag { border-top: 3px solid var(--rag); }

.sol-body {
  font-size: 12.5px;
  line-height: 1.8;
  color: var(--ink-soft);
  white-space: pre-wrap;
  word-wrap: break-word;
  flex: 1;
}
.sol-area {
  margin-top: 14px;
  padding-top: 10px;
  border-top: 1px dashed var(--line);
  font-size: 11px;
  color: var(--ink-mute);
  letter-spacing: 0.05em;
}
.sol-area strong {
  color: var(--ink-soft);
  font-weight: 500;
  margin-left: 6px;
}

/* メタ情報 */
.meta-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  background: var(--bg-paper);
  border: 1px solid var(--line);
  padding: 20px 24px;
  border-radius: 2px;
}
@media (max-width: 700px) { .meta-grid { grid-template-columns: 1fr; } }
.meta-item {
  font-size: 12px;
  line-height: 1.7;
}
.meta-item dt {
  font-family: var(--serif);
  font-size: 10px;
  letter-spacing: 0.15em;
  color: var(--ink-mute);
  text-transform: uppercase;
  font-weight: 600;
  margin-bottom: 4px;
}
.meta-item dd {
  color: var(--ink-soft);
}

/* ------ マトリクスビュー ------ */
.matrix-view {
  padding: 32px 40px 60px;
  display: none;
}
.matrix-view.active { display: block; }

.matrix-intro {
  margin-bottom: 20px;
  color: var(--ink-soft);
  font-size: 13px;
}

.matrix-wrap {
  background: var(--bg-paper);
  border: 1px solid var(--line);
  border-radius: 2px;
  overflow: auto;
}
table.matrix {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  min-width: 900px;
}
.matrix thead th {
  background: var(--ink);
  color: var(--bg-paper);
  padding: 12px 10px;
  text-align: left;
  font-family: var(--serif);
  font-weight: 500;
  font-size: 11px;
  letter-spacing: 0.08em;
  border-right: 1px solid #3a4050;
  position: sticky;
  top: 0;
  z-index: 2;
  white-space: nowrap;
}
.matrix thead th.center { text-align: center; }
.matrix tbody td {
  padding: 10px;
  border-bottom: 1px solid var(--line-soft);
  vertical-align: top;
  line-height: 1.5;
}
.matrix tbody td.center { text-align: center; }
.matrix tbody tr {
  cursor: pointer;
  transition: background 0.1s;
}
.matrix tbody tr:hover { background: #fff; }
.matrix tbody tr.active { background: #fff5ef; }
.mat-no {
  font-family: var(--serif);
  font-weight: 600;
  color: var(--accent);
}
.mat-name { font-weight: 500; color: var(--ink); }
.mat-pattern {
  font-size: 10px;
  color: var(--ink-mute);
  font-family: var(--mono);
}
.fit-cell {
  font-family: var(--serif);
  font-size: 15px;
  font-weight: 600;
}
.fit-cell.excellent { color: var(--accent); }
.fit-cell.good { color: var(--gold); }
.fit-cell.poor { color: #bbb; }

/* ------ ウェルカム ------ */
.welcome {
  padding: 80px 60px;
  text-align: center;
  max-width: 600px;
  margin: 0 auto;
  display: none;
}
.welcome.active { display: block; }
.welcome-mark {
  font-family: var(--serif);
  font-size: 56px;
  color: var(--accent);
  margin-bottom: 16px;
}
.welcome h2 {
  font-family: var(--serif);
  font-size: 24px;
  margin-bottom: 12px;
  color: var(--ink);
}
.welcome p {
  color: var(--ink-soft);
  font-size: 14px;
  line-height: 1.9;
}

/* ------ レスポンシブ ------ */
.hamburger { display: none; }
@media (max-width: 900px) {
  .main { grid-template-columns: 1fr; }
  .sidebar {
    position: fixed;
    top: 0;
    left: 0;
    height: 100%;
    width: 85%;
    max-width: 380px;
    transform: translateX(-100%);
    transition: transform 0.25s;
    z-index: 100;
    box-shadow: 4px 0 24px rgba(0,0,0,0.2);
  }
  .sidebar.open { transform: translateX(0); }
  .hamburger {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 36px; height: 36px;
    background: transparent;
    border: 1px solid var(--bg-paper);
    color: var(--bg-paper);
    cursor: pointer;
    border-radius: 2px;
  }
  .detail, .matrix-view { padding: 20px; }
  .detail-title { font-size: 22px; }
  .header-stats { display: none; }
}

.backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 99;
}
.backdrop.show { display: block; }

/* 強調モード */
::selection { background: var(--accent); color: white; }
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="header-left">
      <button class="hamburger" id="hamburger" aria-label="menu">☰</button>
      <div>
        <div class="header-sub">INTEGRATED CASEBOOK</div>
        <h1 class="header-title">統合25ユースケース <span class="accent">×</span> AI解決策マトリクス</h1>
      </div>
    </div>
    <div class="header-stats">
      <div class="stat"><div class="stat-num" id="stat-total">25</div><div class="stat-lbl">USE CASES</div></div>
      <div class="stat"><div class="stat-num" id="stat-pattern">9</div><div class="stat-lbl">PATTERNS</div></div>
      <div class="stat"><div class="stat-num" id="stat-visible">25</div><div class="stat-lbl">VISIBLE</div></div>
    </div>
  </header>

  <div class="main">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <div class="search-wrap">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" class="search" id="search" placeholder="キーワードで検索（名前・課題・解決策）">
        </div>
        <div class="filter-row" id="filters"></div>
      </div>
      <div class="sidebar-list" id="list"></div>
    </aside>

    <main class="content">
      <nav class="view-tabs">
        <button class="vtab active" data-view="detail">■ 詳細ビュー</button>
        <button class="vtab" data-view="matrix">▦ 一覧マトリクス</button>
      </nav>

      <div class="welcome active" id="welcome">
        <div class="welcome-mark">◇</div>
        <h2>ユースケースを選択してください</h2>
        <p>左のサイドバーから、気になるユースケースをクリックすると<br>課題・あるべき姿・3種のAI解決策（Chat／Agent／RAG）の<br>詳細を閲覧できます。上の「一覧マトリクス」で全件俯瞰も可能です。</p>
      </div>

      <section class="detail" id="detail"></section>
      <section class="matrix-view" id="matrix"></section>
    </main>
  </div>
</div>

<script>

// ---- 状態 ----
const state = {
  selected: null,
  search: '',
  patternFilter: 'all',
  view: 'detail'
};

// ---- フィット変換 ----
function fitLevel(v) {
  if (v === '◎') return { level: 'excellent', score: 3 };
  if (v === '○') return { level: 'good', score: 2 };
  if (v === '△') return { level: 'okay', score: 1 };
  return { level: 'poor', score: 0 };
}

// ---- パターンユニーク ----
const PATTERNS = [...new Set(DATA.map(d => d.pattern))].sort();
const patternColors = {};
const palette = ['#b8543d', '#8b3d2a', '#b8893f', '#7a3e9d', '#2563a8', '#2d7a4f', '#a04040', '#3d4556', '#8b6914'];
PATTERNS.forEach((p, i) => patternColors[p] = palette[i % palette.length]);

// ---- フィルターチップ初期化 ----
function renderFilters() {
  const el = document.getElementById('filters');
  el.innerHTML = '';
  const all = document.createElement('button');
  all.className = 'chip' + (state.patternFilter === 'all' ? ' active' : '');
  all.textContent = 'すべて';
  all.onclick = () => { state.patternFilter = 'all'; renderFilters(); renderList(); };
  el.appendChild(all);
  PATTERNS.forEach(p => {
    const b = document.createElement('button');
    b.className = 'chip' + (state.patternFilter === p ? ' active' : '');
    const label = p.split('.')[0] + '.';
    b.innerHTML = `<span class="dot" style="background:${patternColors[p]}"></span>${label}`;
    b.title = p;
    b.onclick = () => { state.patternFilter = p; renderFilters(); renderList(); };
    el.appendChild(b);
  });
}

// ---- リストフィルタ ----
function filteredData() {
  const q = state.search.toLowerCase().trim();
  return DATA.filter(d => {
    if (state.patternFilter !== 'all' && d.pattern !== state.patternFilter) return false;
    if (!q) return true;
    const hay = [d.name, d.pattern, d.issue, d.tobe, d.chat_sol, d.agent_sol, d.rag_sol, d.industry].join(' ').toLowerCase();
    return hay.includes(q);
  });
}

// ---- サイドバーリスト描画 ----
function renderList() {
  const el = document.getElementById('list');
  const filtered = filteredData();
  document.getElementById('stat-visible').textContent = filtered.length;

  if (filtered.length === 0) {
    el.innerHTML = '<div class="no-results">該当するユースケースがありません</div>';

    html += `<div class="group-header">${escapeHtml(g)}</div>`;
    groups[g].forEach(d => {
      const active = state.selected === d.no ? ' active' : '';
      const cf = fitLevel(d.chat_fit), af = fitLevel(d.agent_fit), rf = fitLevel(d.rag_fit);
      html += `

          <div class="uc-body">

            <div class="uc-meta">
              <span class="uc-pattern">${escapeHtml(d.pattern.split('.')[0])}・${escapeHtml(d.track)}</span>
              <span class="fit-marks">
                <span class="fit-pill chat${cf.score < 2 ? ' dim' : ''}" title="Chat: ${d.chat_fit}">C ${d.chat_fit || '-'}</span>
                <span class="fit-pill agent${af.score < 2 ? ' dim' : ''}" title="Agent: ${d.agent_fit}">A ${d.agent_fit || '-'}</span>
                <span class="fit-pill rag${rf.score < 2 ? ' dim' : ''}" title="RAG: ${d.rag_fit}">R ${d.rag_fit || '-'}</span>
              </span>
            </div>
          </div>
        </div>`;
    });
  });
  el.innerHTML = html;

  el.querySelectorAll('.uc-item').forEach(it => {
    it.onclick = () => selectCase(parseInt(it.dataset.no));
  });
}

// ---- 詳細描画 ----
function selectCase(no) {
  state.selected = no;
  state.view = 'detail';
  document.querySelectorAll('.vtab').forEach(t => t.classList.toggle('active', t.dataset.view === 'detail'));
  document.getElementById('welcome').classList.remove('active');
  document.getElementById('matrix').classList.remove('active');
  document.getElementById('detail').classList.add('active');

  renderList();
  renderDetail();

  // モバイル: サイドバーを閉じる
  if (window.innerWidth <= 900) {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('backdrop').classList.remove('show');
  }
  // 先頭へスクロール
  document.querySelector('.content').scrollTo({ top: 0, behavior: 'smooth' });
}

function renderDetail() {
  const d = DATA.find(x => x.no === state.selected);
  if (!d) return;
  const el = document.getElementById('detail');

  const cats = [];
  if (d.efficiency === '●') cats.push('業務効率化');
  if (d.analysis === '●') cats.push('データ分析');
  if (d.strategy === '●') cats.push('事業構想');

  const cf = fitLevel(d.chat_fit), af = fitLevel(d.agent_fit), rf = fitLevel(d.rag_fit);

  el.innerHTML = `
    <div class="detail-head">
      <div class="breadcrumb">${escapeHtml(d.group)}<span class="sep">▸</span>${escapeHtml(d.pattern)}</div>
      <div class="detail-no">USE CASE ${String(d.no).padStart(2,'0')} / 25</div>
      <h2 class="detail-title">${escapeHtml(d.name)}</h2>
      <div class="detail-badges">
        <span class="badge track">TRACK: ${escapeHtml(d.track)}</span>
        ${cats.map(c => `<span class="badge cat">${escapeHtml(c)}</span>`).join('')}
      </div>
    </div>

    <div class="section-2col">
      <div class="card issue">
        <div class="card-label">AS IS</div>
        <h3>現状の業務課題</h3>
        <div class="card-body">${escapeHtml(d.issue)}</div>
      </div>
      <div class="card tobe">
        <div class="card-label">TO BE</div>
        <h3>ありたい姿</h3>
        <div class="card-body">${escapeHtml(d.tobe)}</div>
      </div>
    </div>

    <div class="solutions">
      <h2 class="sec-title"><span class="sec-num">§ 01</span>AI解決策の比較</h2>
      <div class="sol-grid">
        <div class="sol-card chat">
          <div class="sol-header">
            <div>
              <div class="sol-name">AIチャット</div>
              <div class="sol-type">CLAUDE CHAT</div>
            </div>
            <div style="text-align:right">
              <div class="sol-fit ${cf.level}">${d.chat_fit || '—'}</div>
              <div class="sol-fit-lbl">FIT</div>
            </div>
          </div>
          <div class="sol-body">${escapeHtml(d.chat_sol) || '<span style="color:var(--ink-mute)">情報なし</span>'}</div>
          ${d.chat_area ? `<div class="sol-area">活用領域<strong>${escapeHtml(d.chat_area)}</strong></div>` : ''}
        </div>

        <div class="sol-card agent">
          <div class="sol-header">
            <div>
              <div class="sol-name">AIエージェント</div>
              <div class="sol-type">CLAUDE CODE</div>
            </div>
            <div style="text-align:right">
              <div class="sol-fit ${af.level}">${d.agent_fit || '—'}</div>
              <div class="sol-fit-lbl">FIT</div>
            </div>
          </div>
          <div class="sol-body">${escapeHtml(d.agent_sol) || '<span style="color:var(--ink-mute)">情報なし</span>'}</div>
          ${d.agent_area ? `<div class="sol-area">活用領域<strong>${escapeHtml(d.agent_area)}</strong></div>` : ''}
        </div>

        <div class="sol-card rag">
          <div class="sol-header">
            <div>
              <div class="sol-name">RAG</div>
              <div class="sol-type">NOTEBOOKLM</div>
            </div>
            <div style="text-align:right">
              <div class="sol-fit ${rf.level}">${d.rag_fit || '—'}</div>
              <div class="sol-fit-lbl">FIT</div>
            </div>
          </div>
          <div class="sol-body">${escapeHtml(d.rag_sol) || '<span style="color:var(--ink-mute)">情報なし</span>'}</div>
          ${d.rag_area ? `<div class="sol-area">活用領域<strong>${escapeHtml(d.rag_area)}</strong></div>` : ''}
        </div>
      </div>
    </div>

    <div class="solutions">
      <h2 class="sec-title"><span class="sec-num">§ 02</span>関連情報</h2>
      <dl class="meta-grid">
        <div class="meta-item">
          <dt>業界バリエーション</dt>
          <dd>${escapeHtml(d.industry) || '—'}</dd>
        </div>
        <div class="meta-item">
          <dt>元ユースケース（部門横断マッピング）</dt>
          <dd style="font-family:var(--mono);font-size:11px">${escapeHtml(d.mapping) || '—'}</dd>
        </div>
      </dl>
    </div>
  `;
}

// ---- マトリクス描画 ----
function renderMatrix() {
  const el = document.getElementById('matrix');
  const filtered = filteredData();

  let rows = filtered.map(d => {
    const cf = fitLevel(d.chat_fit), af = fitLevel(d.agent_fit), rf = fitLevel(d.rag_fit);
    const active = state.selected === d.no ? ' active' : '';
    return `
      <tr data-no="${d.no}" class="${active}">
        <td class="center mat-no">${String(d.no).padStart(2,'0')}</td>
        <td>
          <div class="mat-name">${escapeHtml(d.name)}</div>
          <div class="mat-pattern">${escapeHtml(d.pattern)}</div>
        </td>
        <td>${escapeHtml(d.track)}</td>
        <td class="center fit-cell ${cf.level}">${d.chat_fit || '—'}</td>
        <td class="center fit-cell ${af.level}">${d.agent_fit || '—'}</td>
        <td class="center fit-cell ${rf.level}">${d.rag_fit || '—'}</td>
        <td>${escapeHtml(d.industry) || '—'}</td>
      </tr>`;
  }).join('');

  el.innerHTML = `
    <div class="matrix-intro">
      <strong>${filtered.length}件</strong>のユースケースを一覧表示中。行をクリックすると詳細を表示します。
      <span style="color:var(--ink-mute);margin-left:12px">◎=最適 / ○=適する / △=限定的</span>
    </div>
    <div class="matrix-wrap">
      <table class="matrix">
        <thead>
          <tr>
            <th class="center" style="width:50px">No.</th>
            <th>ユースケース名 / 業務パターン</th>
            <th style="width:80px">トラック</th>
            <th class="center" style="width:70px" title="AIチャット適合度">Chat</th>
            <th class="center" style="width:70px" title="AIエージェント適合度">Agent</th>
            <th class="center" style="width:70px" title="RAG適合度">RAG</th>
            <th>業界バリエーション</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;

  el.querySelectorAll('tbody tr').forEach(tr => {
    tr.onclick = () => selectCase(parseInt(tr.dataset.no));
  });
}

// ---- ビュー切替 ----
document.querySelectorAll('.vtab').forEach(tab => {
  tab.onclick = () => {
    const v = tab.dataset.view;
    state.view = v;
    document.querySelectorAll('.vtab').forEach(t => t.classList.toggle('active', t === tab));
    document.getElementById('welcome').classList.remove('active');
    document.getElementById('detail').classList.remove('active');
    document.getElementById('matrix').classList.remove('active');
    if (v === 'detail') {
      if (state.selected) {
        document.getElementById('detail').classList.add('active');
        renderDetail();
      } else {
        document.getElementById('welcome').classList.add('active');
      }
    } else if (v === 'matrix') {
      document.getElementById('matrix').classList.add('active');
      renderMatrix();
    }
    document.querySelector('.content').scrollTo({ top: 0, behavior: 'smooth' });
  };
});

// ---- 検索 ----
document.getElementById('search').addEventListener('input', e => {
  state.search = e.target.value;
  renderList();
  if (state.view === 'matrix') renderMatrix();
});

// ---- ハンバーガー ----
document.getElementById('hamburger').onclick = () => {
  const sb = document.getElementById('sidebar');
  const bd = document.getElementById('backdrop');
  const open = sb.classList.toggle('open');
  bd.classList.toggle('show', open);
};
document.getElementById('backdrop').onclick = () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('backdrop').classList.remove('show');
};

// ---- キーボードショートカット ----
document.addEventListener('keydown', e => {
  if (e.key === '/' && !['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) {
    e.preventDefault();
    document.getElementById('search').focus();
  }
  if (e.key === 'Escape') {
    document.getElementById('search').value = '';
    state.search = '';
    renderList();
    if (state.view === 'matrix') renderMatrix();
  }
  // j/k でリスト移動
  if ((e.key === 'j' || e.key === 'k') && !['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) {
    const filtered = filteredData();
    if (filtered.length === 0) return;
    const idx = filtered.findIndex(d => d.no === state.selected);
    let next = e.key === 'j' ? (idx < 0 ? 0 : Math.min(filtered.length - 1, idx + 1)) : Math.max(0, idx - 1);
    selectCase(filtered[next].no);
  }
});

// ---- ユーティリティ ----
function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

// ---- 初期化 ----
document.getElementById('stat-total').textContent = DATA.length;
document.getElementById('stat-pattern').textContent = PATTERNS.length;
renderFilters();
renderList();
</script>
</body>
</html>
